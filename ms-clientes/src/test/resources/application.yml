spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  rabbitmq:
    host: localhost
    port: 5672

rabbitmq:
  exchange: test-exchange
  routing-key:
    cliente-creado: test-routing-key
    cliente-eliminado: test-routing-key-eliminado

  queue:
    cliente-creado: test-queue-cliente-creado
    cliente-eliminado: test-queue-cliente-eliminado
