server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: ms-clientes

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_clientes}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

# Configuración de colas RabbitMQ
rabbitmq:
  exchange: sofka.exchange
  queue:
    cliente-creado: cliente.creado.queue
    cliente-eliminado: cliente.eliminado.queue
  routing-key:
    cliente-creado: cliente.creado
    cliente-eliminado: cliente.eliminado

logging:
  level:
    com.sofka: DEBUG
    org.springframework.amqp: INFO
